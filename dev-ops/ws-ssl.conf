upstream elms_noti_ws {
    server 192.168.0.10:6116;
    keepalive 64;
}

map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
}

server {
    listen        443 ssl;
    server_name   elms-noti.developteam.net;
    ssl_certificate /etc/letsencrypt/live/elms-noti.developteam.net/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/elms-noti.developteam.net/privkey.pem;
    gzip off;
    
    location / {
         proxy_pass                          http://elms_noti_ws;
         proxy_http_version                  1.1;
         proxy_set_header  Connection        "";
         proxy_set_header  Host              $host;
         proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
         proxy_set_header  X-Real-IP         $remote_addr;
         proxy_set_header Upgrade $http_upgrade;
         proxy_set_header Connection $connection_upgrade;
     proxy_ssl_certificate     /etc/letsencrypt/live/elms-noti.developteam.net/fullchain.pem;
     proxy_ssl_certificate_key /etc/letsencrypt/live/elms-noti.developteam.net/privkey.pem;
     proxy_connect_timeout 300;
     proxy_send_timeout 120;
     proxy_read_timeout 120;
    }
}